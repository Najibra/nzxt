<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Kraken HUD Sensors</title>
<style>
  body, html { margin:0; padding:0; background:transparent; height:100%; }
  .viewport {
    width:640px; height:640px; margin:auto;
    border-radius:50%; overflow:hidden; position:relative;
    background: radial-gradient(120% 120% at 50% 50%, #0e190e 0%, #0a0f0a 60%, #000 100%);
    box-shadow: inset 0 0 60px rgba(0,0,0,.7);
  }
  canvas { width:100%; height:100%; display:block; }

  .chip {
    position:absolute;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    color:#63ff87;
    font-size:28px;
    text-shadow:0 0 8px rgba(99,255,135,0.6);
    background: rgba(20,40,28,.18);
    border: 1px solid rgba(99,255,135,.25);
    border-radius:12px; padding:6px 10px;
    backdrop-filter: blur(2px);
  }
  #cpuTemp { top:26px; left:26px; }
  #gpuTemp { top:26px; right:26px; text-align:right; }
  #pumpRpm { bottom:26px; left:26px; }
  #gpuFan  { bottom:26px; right:26px; text-align:right; }
  #mbTemp  { bottom:96px; left:50%; transform:translateX(-50%); }

  /* dashed ring accents */
  .rings::before, .rings::after {
    content:""; position:absolute; inset:8%; border-radius:50%;
    border:1px dashed rgba(99,255,135,.18);
    box-shadow:
      inset 0 0 40px rgba(99,255,135,.07),
      0 0 0 1px rgba(99,255,135,.06);
    pointer-events:none;
  }
  .rings::after { inset:26%; }
</style>
</head>
<body>
  <div class="viewport rings">
    <canvas id="hud" width="640" height="640" aria-hidden="true"></canvas>
    <!-- Sensor chips (always on top) -->
    <div id="cpuTemp" class="chip">CPU: -- °C</div>
    <div id="gpuTemp" class="chip">GPU: -- °C</div>
    <div id="pumpRpm" class="chip">Pump: -- RPM</div>
    <div id="gpuFan" class="chip">GPU Fan: -- RPM</div>
    <div id="mbTemp" class="chip">MB: -- °C</div>
  </div>

<script>
const canvas = document.getElementById("hud");
const ctx = canvas.getContext("2d");

/* simple HUD render loop (60fps-ish) */
function draw(){
  const w = canvas.width, h = canvas.height, cx = w/2, cy = h/2;
  ctx.clearRect(0,0,w,h);

  // green grid rings
  ctx.save();
  ctx.strokeStyle="rgba(99,255,135,0.28)";
  ctx.lineWidth=2;
  for(let r=80;r<=300;r+=40){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  }

  // rotating dashed ring
  const spin = (performance.now()/1000) * 0.6;
  ctx.translate(cx,cy);
  ctx.rotate(spin);
  ctx.setLineDash([8,16]);
  ctx.strokeStyle="rgba(99,255,135,0.45)";
  ctx.beginPath(); ctx.arc(0,0, 290, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // reticle
  ctx.strokeStyle="rgba(99,255,135,0.5)";
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-64,0); ctx.lineTo(64,0); ctx.moveTo(0,-64); ctx.lineTo(0,64); ctx.stroke();
  ctx.restore();

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* === SENSOR HANDLING === */
const PREFERRED_KEYS = {
  cpuTemp: ["cpu_temperature","cpu_temp","package_temp","t_ctl","cpu_die_temp"],
  gpuTemp: ["gpu_temperature","gpu_temp","gpu_hotspot"],
  pumpRpm: ["pump_rpm","liquid_pump","cpu_fan_rpm","aio_pump"],
  gpuFan:  ["gpu_fan_rpm","gpu_fan_speed","gpu_fan"],
  mbTemp:  ["motherboard_temp","vrm_temp","temp_mos","pch_temp","chipset_temp","system_temp"]
};

function flatten(obj,prefix=""){
  const out={};
  for(const [k,v] of Object.entries(obj||{})){
    const key=prefix?`${prefix}_${k}`:k;
    if(v && typeof v==="object" && !Array.isArray(v)) Object.assign(out,flatten(v,key));
    else out[key]=v;
  }
  return out;
}

function pick(sensors, keys){
  for(const k of keys){
    if(k in sensors && sensors[k]!=null) return sensors[k];
    const alt = Object.keys(sensors).find(n=>n.toLowerCase()===k.toLowerCase());
    if(alt) return sensors[alt];
  }
  return null;
}

function setText(id, label, value, unit){
  const el = document.getElementById(id);
  if(!el) return;
  if(value==null || isNaN(value)) { el.textContent = label + ": -- " + unit; return; }
  el.textContent = label + ": " + Math.round(value) + " " + unit;
}

/* Main CAM callback */
window.onMonitoringDataUpdate = function(payload){
  const s = flatten(payload);
  setText("cpuTemp","CPU", pick(s,PREFERRED_KEYS.cpuTemp), "°C");
  setText("gpuTemp","GPU", pick(s,PREFERRED_KEYS.gpuTemp), "°C");
  setText("pumpRpm","Pump", pick(s,PREFERRED_KEYS.pumpRpm), "RPM");
  setText("gpuFan","GPU Fan", pick(s,PREFERRED_KEYS.gpuFan), "RPM");
  setText("mbTemp","MB", pick(s,PREFERRED_KEYS.mbTemp), "°C");
};

/* Optional desktop preview without CAM: fake data so you can see layout in browser */
(function demoIfDesktop(){
  const isKraken = /[?&]kraken=1/.test(location.search);
  if(isKraken) return;
  let t=0;
  setInterval(()=>{
    t+=0.05;
    window.onMonitoringDataUpdate({
      cpu:{temperature: 40+20*Math.abs(Math.sin(t))},
      gpu:{temperature: 45+25*Math.abs(Math.cos(t)), fan_rpm: 900+800*Math.abs(Math.sin(t*0.4))},
      pump_rpm: 1100+200*Math.abs(Math.cos(t*0.7)),
      motherboard:{vrm_temp: 50+10*Math.abs(Math.sin(t*0.3))}
    });
  }, 250);
})();
</script>
</body>
</html>
