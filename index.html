<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Kraken HUD Sensors — Inner</title>
<style>
  html, body { margin:0; padding:0; background:transparent; height:100%; }
  .viewport {
    width:640px; height:640px; margin:auto;
    position:relative; border-radius:50%; overflow:hidden;
    background: radial-gradient(120% 120% at 50% 50%, #0f1a10 0%, #0a0f0a 60%, #000 100%);
    box-shadow: inset 0 0 60px rgba(0,0,0,.7);
  }
  canvas { width:100%; height:100%; display:block; }

  /* Inner ring chip positions (closer to center) */
  .chip {
    position:absolute;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    color:#63ff87; font-size:26px;
    text-shadow:0 0 8px rgba(99,255,135,0.6);
    background: rgba(20,40,28,.18);
    border: 1px solid rgba(99,255,135,.25);
    border-radius:12px; padding:6px 10px;
    backdrop-filter: blur(2px);
    transform: translate(-50%,-50%);
    white-space: nowrap;
  }
  /* place around a circle of radius ~170px */
  #cpuTemp { left:160px; top:170px; }     /* upper-left */
  #gpuTemp { left:480px; top:170px; }     /* upper-right */
  #pumpRpm { left:160px; top:470px; }     /* lower-left */
  #gpuFan  { left:480px; top:470px; }     /* lower-right */
  #mbTemp  { left:320px; top:500px; }     /* bottom-center */
</style>
</head>
<body>
  <div class="viewport">
    <canvas id="hud" width="640" height="640" aria-hidden="true"></canvas>
    <div id="cpuTemp" class="chip">CPU: -- °C</div>
    <div id="gpuTemp" class="chip">GPU: -- °C</div>
    <div id="pumpRpm" class="chip">Pump: -- RPM</div>
    <div id="gpuFan"  class="chip">GPU Fan: -- RPM</div>
    <div id="mbTemp"  class="chip">MB: -- °C</div>
  </div>

<script>
/* ====== DRAW HUD ====== */
const canvas = document.getElementById("hud");
const ctx = canvas.getContext("2d");

function draw(){
  const w=canvas.width, h=canvas.height, cx=w/2, cy=h/2;
  ctx.clearRect(0,0,w,h);

  // rings
  ctx.save();
  ctx.strokeStyle="rgba(99,255,135,0.28)";
  ctx.lineWidth=2;
  for(let r=90;r<=300;r+=36){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  }

  // rotating dashed ring
  const spin = (performance.now()/1000) * 0.6;
  ctx.translate(cx,cy);
  ctx.rotate(spin);
  ctx.setLineDash([8,16]);
  ctx.strokeStyle="rgba(99,255,135,0.45)";
  ctx.beginPath(); ctx.arc(0,0, 280, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // reticle
  ctx.strokeStyle="rgba(99,255,135,0.5)";
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-60,0); ctx.lineTo(60,0); ctx.moveTo(0,-60); ctx.lineTo(0,60); ctx.stroke();
  ctx.restore();

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ====== SENSOR LOGIC ====== */
/* Many CAM builds nest data; we accept several callback names and postMessage events. */
const KEYMAP = {
  cpuTemp: ["cpu_temperature","cpu_temp","package_temp","tctl","t_ctl","cpu_die_temp"],
  gpuTemp: ["gpu_temperature","gpu_temp","gpu_hotspot","gpu_hotspot_temp"],
  pumpRpm: ["pump_rpm","liquid_pump","cpu_fan_rpm","aio_pump","pump"],
  gpuFan:  ["gpu_fan_rpm","gpu_fan_speed","gpu_fan","gpu_fanspeed"],
  mbTemp:  ["motherboard_temp","vrm_temp","temp_mos","pch_temp","chipset_temp","system_temp","mainboard_temp"]
};

function flatten(obj,prefix=""){
  const out={};
  if(!obj) return out;
  for(const [k,v] of Object.entries(obj)){
    const kk = prefix?`${prefix}_${k}`:k;
    if(v && typeof v==="object" && !Array.isArray(v)) Object.assign(out, flatten(v, kk));
    else out[kk]=v;
  }
  return out;
}

function findFirst(sensors, cand){
  const keys = Object.keys(sensors);
  for(const k of cand){
    if(k in sensors) return sensors[k];
    const alt = keys.find(n=>n.toLowerCase()===k.toLowerCase());
    if(alt) return sensors[alt];
  }
  return null;
}

function fmt(val, unit){
  if(val==null || isNaN(val)) return `-- ${unit}`;
  // Treat 0 and negatives as missing for temps / RPM (CAM sometimes starts with zeros)
  if((unit==="°C" && val<=0) || (unit==="RPM" && val<=0)) return `-- ${unit}`;
  return `${Math.round(val)} ${unit}`;
}

function applySensors(sensors){
  // accept either a flat object or {sensors:{...}} shapes
  const s = sensors?.sensors ? flatten(sensors.sensors) : flatten(sensors);

  const cpu = findFirst(s, KEYMAP.cpuTemp);
  const gpu = findFirst(s, KEYMAP.gpuTemp);
  const pump= findFirst(s, KEYMAP.pumpRpm);
  const gfan= findFirst(s, KEYMAP.gpuFan);
  const mb  = findFirst(s, KEYMAP.mbTemp);

  document.getElementById("cpuTemp").textContent = "CPU: " + fmt(cpu, "°C");
  document.getElementById("gpuTemp").textContent = "GPU: " + fmt(gpu, "°C");
  document.getElementById("pumpRpm").textContent = "Pump: " + fmt(pump, "RPM");
  document.getElementById("gpuFan").textContent  = "GPU Fan: " + fmt(gfan, "RPM");
  document.getElementById("mbTemp").textContent  = "MB: " + fmt(mb, "°C");
}

/* Accept multiple callback names that CAM may use */
window.onMonitoringDataUpdate = applySensors;
window.NZXTWebIntegrationOnMonitoringDataUpdate = applySensors;

/* Also listen for postMessage events, in case CAM posts messages */
window.addEventListener("message", (ev)=>{
  try{
    if(!ev || !ev.data) return;
    if(ev.data.type==="monitoringData" || ev.data.sensors){
      applySensors(ev.data);
    }
  }catch(e){/* ignore */}
});

/* Desktop preview without CAM */
(function demoIfDesktop(){
  const isKraken = /[?&]kraken=1/.test(location.search);
  if(isKraken) return;
  let t=0;
  setInterval(()=>{
    t+=0.05;
    applySensors({
      sensors:{
        cpu:{ temperature: 37+18*Math.abs(Math.sin(t)) },
        gpu:{ temperature: 42+22*Math.abs(Math.cos(t)), fan_rpm: 900+1000*Math.abs(Math.sin(t*0.4)) },
        pump_rpm: 1100+400*Math.abs(Math.cos(t*0.7)),
        motherboard:{ vrm_temp: 50+10*Math.abs(Math.sin(t*0.3)) }
      }
    });
  }, 250);
})();

/* Optional debug: append ?dbg=1 to see incoming payloads in console */
if (/[?&]dbg=1/.test(location.search)) {
  const old = window.onMonitoringDataUpdate;
  window.onMonitoringDataUpdate = (p)=>{ console.log("onMonitoringDataUpdate", p); applySensors(p); };
  window.addEventListener("message", (ev)=>{ if(ev?.data) console.log("postMessage", ev.data); });
}
</script>
</body>
</html>
